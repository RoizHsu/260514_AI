version: '3.8'

services:
  api:
    build: .
    container_name: image-recognition-api
    ports:
      - "8000:8000"
      - "443:443"  # HTTPS 端口
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
      - ./ssl:/app/ssl  # SSL 證書目錄
    environment:
      - PYTHONUNBUFFERED=1
      - USE_HTTPS=false  # 可設置為 true 使用 HTTPS
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - recognition-network

  # 可選：Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: image-recognition-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro  # 掛載 SSL 證書
    depends_on:
      - api
    networks:
      - recognition-network

networks:
  recognition-network:
    driver: bridge
