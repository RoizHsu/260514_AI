version: '3.8'

services:
  api:
    build: .
    container_name: image-recognition-api
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - recognition-network

  # 可選：Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: image-recognition-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - recognition-network

networks:
  recognition-network:
    driver: bridge
