version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digit-recognition-api
    ports:
      - "8000:8000"  # API 端口
    volumes:
      - ./frontend:/app/frontend  # 前端文件
      - ./backend:/app/backend    # 後端代碼
      - ./content:/app/content    # 模型和數據
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: >
      python -m uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    networks:
      - digit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  digit-network:
    driver: bridge
